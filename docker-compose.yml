services:
  spark-edge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3009:3009"
    environment:
      SPARK_CLOUD_URL: ${SPARK_CLOUD_URL}
      SPARK_EDGE_API_URL: ${SPARK_EDGE_API_URL}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      MQTT_URL: mqtt://mosquitto:1883
    volumes:
      - ./packages/db/monitor.db:/app/packages/db/monitor.db
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - spark-edge-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: spark-edge-mosquitto
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - spark-edge-network

networks:
  spark-edge-network:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
